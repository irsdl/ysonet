name: Prepare Major Release PR (retired)

# RETIRED. This workflow used to auto-bump a semantic major version (vN.NN -> v(N+1).00)
# when a PR was merged with the `major` label.
#
# The project now uses calendar versioning: vYEAR.MONTH.RELEASE
#   - middle number is the month
#   - last number is the release count in that month
#   - example: v2026.7.1 is the first release in July 2026
# It was chosen so the version never looks like a .NET version (v2 / v4 / v8 etc.).
#
# There is no "major bump" concept anymore. To cut a release, edit the VERSION file
# directly on master; that triggers tag-build-release.yml, which tags and publishes.
#
# The automatic trigger is removed so this cannot run against the old scheme. The file
# is kept (manual-dispatch only) as a documented placeholder.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "This workflow is retired. Versioning is calendar based: vYEAR.MONTH.RELEASE."
          echo "To release, edit the VERSION file on master (e.g. v2026.7.1) and let"
          echo "tag-build-release.yml handle tagging and publishing."
