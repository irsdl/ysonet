name: Tag, Build & Publish Release

on:
  push:
    branches: [ master ]
    paths:
      - "VERSION"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string like v2026.7.1 (vYEAR.MONTH.RELEASE)"
        required: true
        default: "v2026.7.1"
        type: string
      create_tag:
        description: "Create tag if it doesn't exist"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (2026-06-02)
        with:
          fetch-depth: 0

      - name: Determine version
        id: v
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}".Trim()
          } else {
            $v = (Get-Content VERSION -Raw).Trim()
          }
          # Versioning is calendar based: vYEAR.MONTH.RELEASE (middle = month,
          # last = release count in that month). Example: v2026.7.1.
          if ($v -notmatch '^v\d+\.\d+\.\d+$') { throw "Unexpected VERSION format: $v (expected vYEAR.MONTH.RELEASE like v2026.7.1)" }
          $tag = "ysonet/$v"
          "value=$v"  >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"
          Write-Host "Tag: $tag"

      - name: Check if tag already exists
        id: tagcheck
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.v.outputs.tag }}" >/dev/null; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated tag
        if: |
          # Define conditions for better readability
          ${{ github.event_name == 'push' }} ||
          ${{ 
            github.event_name == 'workflow_dispatch' && 
            inputs.create_tag == true && 
            steps.tagcheck.outputs.exists == 'false' 
          }}
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.v.outputs.tag }}" -m "Release ${{ steps.v.outputs.value }} (ysonet)"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3 (2026-03-20)

      - name: Setup NuGet
        uses: NuGet/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0 (2026-04-15)

      - name: Restore
        run: nuget restore ysonet.sln

      - name: Build (Release)
        run: msbuild ysonet.sln -p:Configuration=Release -m

      # The Release build string-encrypts ysonet.exe (see ysonet/obfuscar.xml and the
      # ObfuscateOutput target). String hiding is surgical: gadget signature strings are
      # encrypted, but benign user-facing text (banner, help) is kept in plain text so the
      # binary does not look like a crypt-everything packer. Verify both halves.
      - name: Verify obfuscation
        shell: pwsh
        run: |
          $exe = ".\ysonet\bin\Release\ysonet.exe"
          $bytes = [IO.File]::ReadAllBytes($exe)
          # Alignment-independent UTF-16 substring search. A whole-file Unicode decode from
          # offset 0 silently misses strings that sit at an odd byte offset, so scan for the
          # literal byte pattern instead.
          function Test-Utf16([byte[]]$hay, [string]$s) {
            $n = [Text.Encoding]::Unicode.GetBytes($s)
            for ($i = 0; $i -le $hay.Length - $n.Length; $i++) {
              $m = $true
              for ($j = 0; $j -lt $n.Length; $j++) { if ($hay[$i + $j] -ne $n[$j]) { $m = $false; break } }
              if ($m) { return $true }
            }
            return $false
          }
          # Gadget signature strings MUST be encrypted (absent as plain text).
          foreach ($sig in 'System.Windows.Data.ObjectDataProvider', 'MethodParameters') {
            if (Test-Utf16 $bytes $sig) { throw "Obfuscation check failed: signature literal still present: $sig" }
          }
          # Benign banner MUST stay in plain text (confirms surgical SkipStringHiding worked).
          if (-not (Test-Utf16 $bytes 'generates deserialization payloads')) { throw "Surgical string hiding failed: benign banner text was also encrypted." }
          if (Test-Path ".\ysonet\bin\Release\ysonet.pdb") { throw "ysonet.pdb should have been removed by obfuscation." }
          Write-Host "Obfuscation verified: signature strings encrypted, benign text preserved."

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Compress-Archive -Path ".\ysonet\bin\Release\*" -DestinationPath "dist\ysonet-${{ steps.v.outputs.value }}.zip" -Force

      - name: Publish GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0 (2026-03-14)
        with:
          tag:  ${{ steps.v.outputs.tag }}
          name: "[ysonet] ${{ steps.v.outputs.value }}"
          generateReleaseNotes: true
          artifacts: "dist/ysonet-${{ steps.v.outputs.value }}.zip"
